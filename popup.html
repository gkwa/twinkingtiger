<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TwinkingTiger</title>
  </head>
  <body>
    <div id="app">
      <h1>TwinkingTiger</h1>
      <div class="form-group">
        <label for="tabDelay">Time per tab (seconds):</label>
        <input type="number" id="tabDelay" min="0.1" step="0.1" value="5" />
      </div>
      <div class="form-group">
        <label for="rounds">Number of rounds (0 for infinite):</label>
        <input type="number" id="rounds" min="0" value="1" />
      </div>
      <div class="status-container">
        <div id="status">Not running</div>
      </div>
      <div class="button-group">
        <button id="startBtn">Start Cycling</button>
        <button id="stopBtn" disabled>Stop Cycling</button>
      </div>
    </div>
    <script type="module" src="/src/popup.js"></script>
  </body>
</html>
